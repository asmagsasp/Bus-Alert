name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor (Manual Copy Fallback)
        run: |
          # 1. Tentar o sync oficial (gera plugins e copia assets)
          npx cap sync android || echo "Sync failed, taking manual action..."
          
          # 2. Garantir que os assets web existam na pasta do Android
          mkdir -p android/app/src/main/assets/public
          cp -r www/* android/app/src/main/assets/public/
          
          # 3. Verificar se o index.html está no lugar certo
          if [ ! -f "android/app/src/main/assets/public/index.html" ]; then
            echo "ERRO: index.html não encontrado em android/app/src/main/assets/public/"
            exit 1
          fi

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bus-alert-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
